# 咕咕嘎嘎 AI虚拟形象 - 配置文件
# ================================

# ==================== 语音识别 (ASR) ====================
asr:
  # 可选: faster_whisper / funasr / whisper
  provider: "funasr"
  faster_whisper:
    model_size: "small"
    device: "auto"
    download_root: "./models/hf"
  funasr:
    model: "paraformer-zh"
    device: "cuda"  # 保留GPU，6GB显存足够并行
  
# ==================== 语音合成 (TTS) ====================
tts:
  provider: "gptsovits"  # 主引擎: gptsovits(音色克隆) / edge(保底)
  # gptsovits: 高质量音色克隆，适合预录音/正式对话
  # edge: 微软保底，无需安装额外模型

  edge:
    voice: "zh-CN-XiaoxiaoNeural"
    rate: "+0%"
    pitch: "+0Hz"
    volume: "+0%"
  gptsovits:
    # GPT-SoVITS 音色克隆配置
    device: "cuda"                            # cuda/cpu
    is_half: true                             # 是否使用半精度
    root_dir: "./app/GPT-SoVITS"              # GPT-SoVITS 根目录
    version: "v3"                             # 模型版本
  # 备用引擎列表 (主引擎失败时自动切换)
  fallback_engines:
    - "edge"

# ==================== 大语言模型 (LLM) ====================
llm:
  provider: "ollama"            # v1.9.43: deepseek/kimi/glm/qwen/minimax/doubao/mimo/openai/anthropic/ollama
  # v2.0: 新增配置
  max_tokens: 2048              # 单次回复最大 token 数（从 512 提升到 2048）
  enable_rag_injection: true    # 启用 RAG 记忆注入
  
  # ===== 国内模型 =====
  deepseek:
    api_key: ""                     # 在 platform.deepseek.com 获取
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"          # deepseek-v4-pro / deepseek-v4-flash / deepseek-chat(V3,将弃用) / deepseek-reasoner(R1,将弃用)
    max_tokens: 2048

  kimi:
    api_key: ""                     # 在 platform.kimi.com 获取
    base_url: "https://api.moonshot.cn/v1"
    model: "kimi-k2.6"              # kimi-k2.6 / kimi-k2.5 / kimi-k2-thinking / moonshot-v1-128k/32k/8k
    max_tokens: 2048

  glm:
    api_key: ""                     # 在 open.bigmodel.cn 获取
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "GLM-4.7-FlashX"        # GLM-5.1 / GLM-5 / GLM-5-Turbo / GLM-4.7 / GLM-4.7-FlashX / GLM-4.7-Flash
    max_tokens: 2048

  qwen:
    api_key: ""                     # 在 dashscope.console.aliyun.com 获取
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen3.6-plus"           # qwen3.6-max-preview / qwen3.6-plus / qwen3.6-flash / qwen-max / qwen-plus
    max_tokens: 2048

  minimax:
    api_key: ""                     # 在 minimaxi.com 获取
    base_url: "https://api.minimaxi.com/anthropic"  # Anthropic 格式（推荐），OpenAI 格式用 /v1
    model: "MiniMax-M2.7"           # M2.7 / M2.7-highspeed / M2.5 / M2.5-highspeed / M2.1 / M2.1-highspeed / M2
    max_tokens: 2048

  doubao:
    api_key: ""                     # 在 console.volcengine.com/ark 获取
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    model: "doubao-1.5-pro-32k"     # doubao-seed-1-8-250415 / doubao-seed-1-6-251015 / doubao-1.5-pro-32k / doubao-1.5-pro-256k
    max_tokens: 2048

  mimo:
    api_key: ""                     # 在 platform.xiaomimimo.com 获取
    base_url: "https://api.xiaomimimo.com/v1"
    model: "mimo-v2.5"              # mimo-v2.5-pro / mimo-v2.5 / mimo-v2.5-flash
    max_tokens: 2048

  # ===== 国际模型 =====
  openai:
    api_key: ""                     # 在 platform.openai.com 获取
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o-mini"            # gpt-4.1 / gpt-4.1-mini / gpt-4o / gpt-4o-mini / o3 / o4-mini
    max_tokens: 2048

  anthropic:
    api_key: ""                     # 在 console.anthropic.com 获取
    base_url: "https://api.anthropic.com"
    model: "claude-sonnet-4-5-20250929"  # claude-sonnet-4-6 / claude-sonnet-4-5 / claude-haiku-4-5 / claude-opus-4
    max_tokens: 2048

  # ===== 本地模型 =====
  ollama:
    api_key: "ollama"               # Ollama 不校验 API Key，随便填
    base_url: "http://localhost:11434/v1"  # Ollama OpenAI 兼容端点
    model: "qwen3:8b"               # 根据 ollama list 输出填写，常用: qwen3:8b, llama3:8b, mistral:7b
    max_tokens: 2048

# ==================== 视觉理解 (Vision) ====================
vision:
  default_provider: "minimax_vl"   # 默认: rapidocr/minimax_vl/minicpm/auto
  rapidocr:
    enabled: true
  minimax_vl:
    api_key: ""                    # 不填则自动从 llm.minimax.api_key 读取
    api_host: "https://api.minimaxi.com"  # VLM API 地址
    model: "MiniMax-VL-01"          # 视觉理解模型名（显示用）
    jpeg_quality: 40               # 截图压缩质量（降低体积，加快上传）
    timeout: 120                   # 请求超时（秒）
  minicpm:
    model_id: "OpenBMB/MiniCPM-V-2"  # HuggingFace 模型 ID (~4-5GB BF16)
    use_int4: false                # 关闭 int4 量化（INT4 有 cos[position_ids] 兼容性问题），使用 BF16
    model_path: ""                  # 本地模型路径（可选，优先使用 model_id 下载）

# ==================== Live2D ====================
live2d:
  enabled: true
  model_path: "./app/web/assets/model/shizuku"
  idle_motion: "Idle"
  
# ==================== Web ====================
web:
  port: 12393
  ws_port: 12394
  
# ==================== 语音输入 ====================
voice_input:
  provider: "web"

# ==================== VAD 优化配置 (P0-3) ====================
vad:
  # 思考停顿容忍时间（ms）—— 短停顿继续倾听
  thinking_pause_ms: 600
  # 真正说完判定时间（ms）—— 超过此值才认为用户说完了
  stop_threshold_ms: 1800
  # 思考模式阈值因子（超过 stop_threshold 的此比例时显示"思考中"）
  thinking_threshold_factor: 0.8
  # 思考模式额外延长时间（ms）—— 检测到思考时额外给用户的时间
  thinking_extend_ms: 2000

# ==================== 记忆系统 v3.0 ====================
memory:
  auto_store: true     # 自动存储

  # ===== Embedding 配置 (1GB显存推荐用 cpu 模式) =====
  # device: cpu  = 零显存占用，内存约 100~500MB（取决于模型）
  # device: cuda = 占用显存，但推理稍快
  embedding_device: "cpu"
  # 当前使用: BAAI/bge-base-zh-v1.5 (中文语义检索最优，768维)
  # 备选模型：
  #   BAAI/bge-small-zh-v1.5                  ~100MB  中文优化，512维，轻量首选
  #   shibing624/text2vec-base-chinese        ~400MB  中文句向量，768维
  #   nomic-ai/nomic-embed-text-v1.5          ~500MB  8192长上下文，768维
  embedding_model: "BAAI/bge-base-zh-v1.5"

  # ===== v3.0 记忆参数 =====
  # 工作记忆上限（超出触发摘要压缩）
  working_memory_limit: 30
  # 摘要触发阈值
  summarize_threshold: 20
  # 每次压缩条数
  summarize_batch: 5
  # 遗忘阈值（保留分数低于此值会被软删除）
  forgetting_threshold: 0.15
  # 时效衰减系数（v3.0: 0.005 更慢衰减，记忆存续更久）
  decay_lambda: 0.005
  # 新记忆保护期（小时）— 保护期内不参与遗忘扫描
  grace_period_hours: 12.0
  # 向量去重阈值（cosine > 此值视为重复）
  dedup_threshold: 0.95
  # 混合检索权重（v3.0: 向量权重降低，关键词权重提高）
  retrieval_weights:
    vector: 0.5       # 向量相似度权重
    keyword: 0.3      # 关键词匹配权重
    recency: 0.2      # 时间衰减权重

# ==================== 子Agent (参考 Claude Code) ====================
subagent:
  enabled: true  # 设为 true 启用

# ==================== AI 主动说话 (v1.9.51) ====================
proactive_speech:
  enabled: true            # v1.9.52: 已启用主动说话
  idle_timeout: 120        # 用户空闲多少秒后触发（默认2分钟）
  min_interval: 300        # 两次主动说话最小间隔秒数（默认5分钟）
  max_daily_count: 15      # 每日主动说话上限
  check_interval: 30       # 检查间隔秒数（不宜太短，默认30秒）
  randomize_range: 30      # 随机延迟范围秒数（避免机械式触发）
  # Claude Code Opus 4.6 配置
  api_key: "${SUBAGENT_API_KEY}"  # 从环境变量读取
  base_url: "https://ccvibe.cc/v1"
  model: "ccvibe/claude-opus-4-6"
  max_concurrent: 3  # 最大并发数

# ==================== MCP 工具协议 (v1.9.52) ====================
mcp:
  enabled: true  # 启用 MCP 工具桥接
  servers: {}
    # 示例：文件系统 MCP 服务器
    # filesystem:
    #   command: "npx"
    #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/dir"]
    #   description: "本地文件系统访问"
    #   enabled: true
    #
    # 示例：GitHub MCP 服务器
    # github:
    #   command: "npx"
    #   args: ["-y", "@modelcontextprotocol/server-github"]
    #   env:
    #     GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
    #   description: "GitHub API 访问"
    #   enabled: true

# ==================== 工具调用可视化 (v1.9.52) ====================
tool_viz:
  enabled: true  # 启用工具调用可视化
  show_input: true     # 显示工具输入参数
  show_output: true    # 显示工具输出结果
  auto_expand: false   # 自动展开工具调用卡片

# ==================== 桌面宠物模式 (v1.9.52) ====================
desktop_pet:
  enabled: false        # 启用桌面宠物模式
  width: 400            # 宠物窗口宽度
  height: 500           # 宠物窗口高度
  always_on_top: true   # 窗口置顶
  transparent: true     # 透明背景
  draggable: true       # 可拖拽
  click_action: "greet" # 点击行为: greet(打招呼) / random(随机动作)

# ==================== Live2D 微动作 (v1.9.52) ====================
live2d_idle_motion:
  enabled: true         # 启用闲置微动作
  interval_min: 5       # 最小间隔秒数
  interval_max: 15      # 最大间隔秒数
  motions:              # 可用微动作列表
    - "Idle"
    - "TapBody"
    - "Flick"
  breath_amplitude: 0.01  # 呼吸动画幅度