<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>咕咕嘎嘎 AI-VTuber</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: white; overflow: hidden;
      user-select: none;
    }

    /* ====== 背景粒子 ====== */
    .particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .particle {
      position: absolute;
      background: rgba(102, 126, 234, 0.5);
      border-radius: 50%;
      animation: float-up linear infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
    
    /* ====== 过渡动画 ====== */
    .fade-out {
      animation: splash-fade-out 0.8s ease-out forwards;
    }
    @keyframes splash-fade-out {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.05); }
    }

    /* ====== Logo ====== */
    .logo-container {
      position: relative; z-index: 1;
      margin-bottom: 32px;
    }
    .logo-ring {
      display: flex; align-items: center; justify-content: center;
    }
    .logo-spin {
      width: 120px; height: 120px;
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
      box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ====== 就绪动画 ====== */
    .logo-ring.ready {
      animation: pulse-ready 0.6s ease-out, spin 1.5s linear infinite;
      border-top-color: #4ade80;
      border-right-color: #22c55e;
    }
    .logo-inner.ready {
      background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
      box-shadow: 0 0 60px rgba(74, 222, 128, 0.5);
    }
    @keyframes pulse-ready {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* ====== 错误状态 ====== */
    .logo-ring.error {
      animation: shake 0.5s ease, spin 3s linear infinite;
      border-top-color: #ef4444;
      border-right-color: #dc2626;
    }
    .logo-inner.error {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      box-shadow: 0 0 40px rgba(239, 68, 68, 0.4);
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    /* ====== 标题 ====== */
    .title {
      position: relative; z-index: 1;
      font-size: 28px; font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient-shift 3s ease infinite;
    }
    @keyframes gradient-shift {
      0%   { background-position: 0% center; }
      50%  { background-position: 200% center; }
      100% { background-position: 0% center; }
    }
    .subtitle {
      position: relative; z-index: 1;
      font-size: 14px; opacity: 0.7;
      margin-bottom: 40px;
      transition: opacity 0.3s, color 0.3s;
    }
    .subtitle.error {
      color: #ef4444;
      opacity: 1;
    }

    /* ====== 进度条 ====== */
    .progress-container {
      position: relative; z-index: 1;
      width: 300px; height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px; overflow: hidden;
      transition: all 0.3s;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
      width: 0%;
      transition: width 0.8s ease;
    }
    .progress-bar.indeterminate {
      width: 30%;
      animation: indeterminate 1.8s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0%   { margin-left: -30%; }
      100% { margin-left: 100%; }
    }
    .progress-bar.ready {
      width: 100%;
      background: linear-gradient(90deg, #4ade80, #22c55e);
      animation: none;
    }
    .progress-bar.error {
      width: 100%;
      background: linear-gradient(90deg, #ef4444, #dc2626);
      animation: none;
    }

    /* ====== 状态文字 ====== */
    .status {
      position: relative; z-index: 1;
      margin-top: 20px; font-size: 13px;
      opacity: 0.6;
      min-height: 20px;
      transition: opacity 0.3s, color 0.3s;
    }
    .status.active { opacity: 1; color: #a5b4fc; }
    .status.ready  { opacity: 1; color: #4ade80; }
    .status.error  { opacity: 1; color: #ef4444; }

    /* 跳动的点 */
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* ====== 错误详情 ====== */
    .error-details {
      position: relative; z-index: 1;
      margin-top: 16px;
      max-width: 400px;
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      font-size: 12px;
      color: #fca5a5;
      display: none;
      word-break: break-word;
    }
    .error-details.visible { display: block; }

    /* ====== 重试按钮 ====== */
    .retry-btn {
      position: relative; z-index: 1;
      margin-top: 16px;
      padding: 8px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none; border-radius: 6px;
      font-size: 13px; cursor: pointer;
      display: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .retry-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .retry-btn.visible { display: inline-block; }

    /* ====== 版本号 ====== */
    .version {
      position: fixed; bottom: 16px;
      font-size: 11px; opacity: 0.3;
      z-index: 1;
    }
    
    /* Created by XZT 样式 */
    .created-by {
      font-size: 0.65em;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient-shift 3s ease infinite;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <!-- 背景粒子 -->
  <div class="particles" id="particles"></div>

  <!-- Logo -->
  <div class="logo-container">
    <div id="logoRing" class="logo-ring">
      <img src="../assets/gugugaga_logo.png" alt="咕咕嘎嘎" id="logoInner" class="logo-spin">
    </div>
  </div>

  <!-- 标题 -->
  <div class="title">咕咕嘎嘎 AI-VTuber <span class="created-by">Created by XZT</span></div>
  <div class="subtitle" id="subtitle">正在启动后端服务</div>

  <!-- 进度条 -->
  <div class="progress-container">
    <div class="progress-bar indeterminate" id="progressBar"></div>
  </div>

  <!-- 状态 -->
  <div class="status dots active" id="status">初始化中</div>

  <!-- 错误详情 -->
  <div class="error-details" id="errorDetails"></div>

  <!-- 重试按钮 -->
  <button class="retry-btn" id="retryBtn" onclick="retryLaunch()">重新启动</button>

  <!-- 版本号 -->
  <div class="version" id="versionText">v1.9.57</div>

  <script>
    // ===== 生成背景粒子 =====
    const particlesEl = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (3 + Math.random() * 4) + 's';
      p.style.animationDelay = Math.random() * 5 + 's';
      const size = 2 + Math.random() * 4;
      p.style.width = p.style.height = size + 'px';
      particlesEl.appendChild(p);
    }

    // ===== 获取版本号 =====
    function loadVersion() {
      if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.getVersion().then(v => {
          document.getElementById('versionText').textContent = v;
        }).catch(() => {});
      }
    }
    setTimeout(loadVersion, 500);
    setTimeout(loadVersion, 2000);

    // ===== 被 launcher.py 调用的接口 =====

    function updateStatus(msg) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status dots active';
      document.getElementById('subtitle').textContent = '正在启动后端服务';
    }

    function onBackendReady() {
      document.getElementById('logoRing').classList.add('ready');
      document.getElementById('logoInner').classList.add('ready');

      const bar = document.getElementById('progressBar');
      bar.classList.remove('indeterminate');
      bar.classList.add('ready');

      const status = document.getElementById('status');
      status.textContent = '后端就绪，正在加载主界面...';
      status.className = 'status ready';
      document.getElementById('subtitle').textContent = '启动完成';
      status.classList.remove('dots');
      
      // 触发淡出过渡动画，然后由 launcher.py 跳转
      document.body.classList.add('fade-out');
    }

    function showError(msg) {
      document.getElementById('logoRing').classList.add('error');
      document.getElementById('logoInner').classList.add('error');

      const bar = document.getElementById('progressBar');
      bar.classList.remove('indeterminate');
      bar.classList.add('error');

      const status = document.getElementById('status');
      status.textContent = '启动失败';
      status.className = 'status error';
      status.classList.remove('dots');

      const subtitle = document.getElementById('subtitle');
      subtitle.textContent = '后端启动出错';
      subtitle.classList.add('error');

      document.getElementById('errorDetails').textContent = msg;
      document.getElementById('errorDetails').classList.add('visible');
      document.getElementById('retryBtn').classList.add('visible');
    }

    function retryLaunch() {
      document.getElementById('logoRing').className = 'logo-ring';
      document.getElementById('logoInner').className = 'logo-inner';
      document.getElementById('progressBar').className = 'progress-bar indeterminate';
      document.getElementById('status').className = 'status dots active';
      document.getElementById('status').textContent = '重新启动中...';
      document.getElementById('subtitle').className = 'subtitle';
      document.getElementById('subtitle').textContent = '正在重新启动';
      document.getElementById('errorDetails').classList.remove('visible');
      document.getElementById('retryBtn').classList.remove('visible');

      if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.restart().catch(() => location.reload());
      } else {
        location.reload();
      }
    }
  </script>
</body>
</html>
